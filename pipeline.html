<!DOCTYPE html>
<html lang="pt-BR" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- PWA -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#16a34a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="EcoFin">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
    <title>EcoFin Manager — Pipeline de Licenças</title>
    <meta name="description" content="EcoFin Manager - Pipeline Kanban para acompanhamento de licenças ambientais.">
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: "#4ade80", "background-dark": "#0f1712" },
                    fontFamily: { display: ["Outfit"] },
                }
            }
        }
    </script>
</head>

<body class="bg-animated min-h-screen text-slate-100 font-display flex overflow-hidden">

    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <!-- Sidebar -->
    <aside id="sidebar"
        class="sidebar w-64 glass-panel border-r border-primary/10 flex flex-col h-screen shrink-0 z-50">
        <div class="p-6 flex items-center gap-3">
            <div
                class="size-10 rounded-xl bg-gradient-to-br from-primary to-emerald-600 flex items-center justify-center text-black font-black text-lg shadow-lg shadow-primary/20">
                E</div>
            <div>
                <h1 class="text-xl font-bold leading-tight tracking-tight">EcoFin</h1>
                <p class="text-[10px] uppercase tracking-widest text-primary/60 font-semibold">Manager</p>
            </div>
        </div>
        <nav class="flex-1 px-4 py-4 space-y-1.5 overflow-y-auto custom-scrollbar">
            <a href="dashboard.html"
                class="nav-item flex items-center gap-3 px-4 py-3 rounded-xl text-slate-400 hover:bg-white/5 hover:text-slate-100 transition-colors">
                <i data-lucide="layout-dashboard"></i><span>Dashboard</span>
            </a>
            <a href="licencas.html"
                class="nav-item flex items-center gap-3 px-4 py-3 rounded-xl text-slate-400 hover:bg-white/5 hover:text-slate-100 transition-colors">
                <i data-lucide="badge-check"></i><span>Licenças</span>
            </a>
            <a href="financeiro.html"
                class="nav-item flex items-center gap-3 px-4 py-3 rounded-xl text-slate-400 hover:bg-white/5 hover:text-slate-100 transition-colors">
                <i data-lucide="wallet"></i><span>Financeiro</span>
            </a>
            <a href="clientes.html"
                class="nav-item flex items-center gap-3 px-4 py-3 rounded-xl text-slate-400 hover:bg-white/5 hover:text-slate-100 transition-colors">
                <i data-lucide="users"></i><span>Clientes</span>
            </a>
            <a href="#"
                class="nav-item active flex items-center gap-3 px-4 py-3 rounded-xl text-primary bg-primary/5 transition-colors">
                <i data-lucide="kanban"></i><span>Pipeline</span>
            </a>
            <a href="perfil.html"
                class="nav-item flex items-center gap-3 px-4 py-3 rounded-xl text-slate-400 hover:bg-white/5 hover:text-slate-100 transition-colors">
                <i data-lucide="user"></i><span>Meu Perfil</span>
            </a>
        </nav>
        <div class="p-4 border-t border-white/5">
            <div class="flex items-center gap-3 p-3 glass-panel rounded-xl">
                <div class="size-9 rounded-full bg-gradient-to-br from-primary/40 to-emerald-700/40 flex items-center justify-center text-sm font-bold"
                    id="sidebar-avatar">A</div>
                <div class="flex-1 min-w-0">
                    <p class="text-sm font-semibold truncate" id="sidebar-user-name">Usuário</p>
                    <p class="text-[10px] text-slate-500 truncate" id="sidebar-user-email">—</p>
                </div>
                <button id="btn-logout" class="text-slate-500 hover:text-red-400 transition-colors" title="Logout">
                    <i data-lucide="log-out" class="text-[20px]"></i>
                </button>
            </div>
        </div>
    </aside>

    <!-- Main -->
    <main class="flex-1 flex flex-col h-screen overflow-hidden relative z-10">
        <header
            class="h-[72px] glass-panel border-b border-primary/10 px-6 lg:px-8 flex items-center justify-between shrink-0">
            <div class="hamburger" id="hamburger-btn"><span></span><span></span><span></span></div>
            <div class="flex items-center gap-4">
                <div>
                    <h2 class="text-lg font-bold">Pipeline de Licenças</h2>
                    <p class="text-xs text-slate-500">Arraste os cartões entre colunas para atualizar o status</p>
                </div>
            </div>
            <button id="btn-novo-card" class="btn-primary text-sm py-2.5 px-5 hidden sm:flex items-center gap-2">
                <i data-lucide="plus" class="text-[16px]"></i>
                Novo Cartão
            </button>
        </header>

        <!-- Kanban Board -->
        <div class="flex-1 overflow-x-auto overflow-y-hidden p-6 lg:p-8" id="kanban-board">
            <div class="flex gap-5 h-full min-w-max" id="columns-container">
                <!-- Populated by JS -->
            </div>
        </div>

        <!-- FAB Mobile -->
        <button id="btn-novo-card-mobile"
            class="sm:hidden fixed bottom-6 right-6 z-40 size-14 bg-primary rounded-2xl shadow-[0_0_25px_rgba(74,222,128,0.3)] flex items-center justify-center text-black hover:scale-110 transition-transform">
            <i data-lucide="plus" class="text-2xl font-bold"></i>
        </button>
    </main>

    <script src="js/supabase.js"></script>
    <script src="js/queries.js"></script>
    <script src="js/pipeline.js"></script>

    <style>
        .kanban-column {
            min-width: 300px;
            max-width: 320px;
        }

        .kanban-card {
            cursor: grab;
            transition: all 0.2s ease;
        }

        .kanban-card:active {
            cursor: grabbing;
            transform: rotate(2deg) scale(1.02);
        }

        .kanban-card:hover {
            border-color: rgba(74, 222, 128, 0.3);
        }

        .kanban-card.dragging {
            opacity: 0.5;
            transform: rotate(3deg);
        }

        .column-drop-zone {
            min-height: 120px;
            transition: background 0.2s ease;
        }

        .column-drop-zone.drag-over {
            background: rgba(74, 222, 128, 0.05);
            border-radius: 12px;
        }

        .priority-high {
            background: rgba(239, 68, 68, 0.12);
            color: #f87171;
        }

        .priority-medium {
            background: rgba(251, 191, 36, 0.12);
            color: #fbbf24;
        }

        .priority-low {
            background: rgba(74, 222, 128, 0.12);
            color: #4ade80;
        }

        .due-overdue {
            color: #f87171;
        }

        .due-soon {
            color: #fbbf24;
        }

        .due-ok {
            color: #94a3b8;
        }
    </style>
  <script src="/js/pwa-install.js"></script>
  <script>document.addEventListener("DOMContentLoaded",()=>lucide.createIcons());</script>
</body>

</html>
