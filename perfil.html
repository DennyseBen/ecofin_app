<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- PWA -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#16a34a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="EcoFin">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
    <title>EcoFin Manager — Meu Perfil</title>
    <meta name="description" content="EcoFin Manager - Gerencie seu perfil e preferências.">
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body>
    <div class="app-layout">
        <div class="sidebar-overlay" id="sidebar-overlay"></div>
        <aside class="app-sidebar" id="sidebar">
            <div class="sidebar-logo">
                <div class="sidebar-logo-icon">E</div>
                <div>
                    <h1>EcoFin</h1><small>Manager</small>
                </div>
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html"><i data-lucide="layout-dashboard"></i>Visão Geral</a>
                <a href="licencas.html"><i data-lucide="badge-check"></i>Licenças</a>
                <a href="financeiro.html"><i data-lucide="wallet"></i>Financeiro</a>
                <a href="clientes.html"><i data-lucide="users"></i>Clientes</a>
                <a href="processos.html"><i data-lucide="kanban"></i>Processos</a>
                <a href="perfil.html" class="active"><i data-lucide="user"></i>Meu Perfil</a>
            </nav>
            <div class="sidebar-user">
                <div class="sidebar-user-card">
                    <div class="sidebar-avatar" id="sidebar-avatar">U</div>
                    <div class="sidebar-user-info">
                        <p id="sidebar-user-name">Usuário</p><small id="sidebar-user-email">—</small>
                    </div><button id="btn-logout" title="Sair"><i data-lucide="log-out" style="font-size:18px;color:var(--text-muted)"></i></button>
                </div>
            
            <div class="sidebar-version"><span>v1.0.0</span><span>Mar 2026</span></div>
        </aside>

        <main class="app-main">
            <header class="app-header">
                <div class="flex items-center gap-3">
                    <button class="hamburger-btn" id="hamburger-btn"><i data-lucide="menu"></i></button>
                    <div>
                        <h2 class="text-lg font-bold">Meu Perfil</h2>
                        <p class="text-xs text-muted hide-mobile">Dados pessoais e preferências</p>
                    </div>
                </div>
                <div class="flex items-center gap-2">
                    <button class="theme-toggle" id="theme-toggle" title="Alternar tema"><i data-lucide="moon" id="theme-icon"></i></button>
                </div>
            </header>

            <div class="app-content">
                <div class="grid gap-6 fade-in" style="grid-template-columns:340px 1fr;max-width:960px">
                    <!-- Avatar Card -->
                    <div class="card" style="text-align:center">
                        <div class="card-body" style="padding:32px 24px">
                            <div style="width:100px;height:100px;border-radius:50%;background:var(--primary-bg);border:3px solid var(--primary-border);display:flex;align-items:center;justify-content:center;font-size:36px;font-weight:800;color:var(--primary);margin:0 auto 16px"
                                id="perfil-avatar-lg">A</div>
                            <h3 class="text-lg font-bold" id="perfil-nome-display">Carregando...</h3>
                            <p class="text-sm text-muted" id="perfil-cargo-display">—</p>
                            <p class="text-xs text-muted mt-2" id="perfil-email-display">—</p>
                            <button class="btn btn-outline btn-sm mt-4" id="btn-upload-avatar"><i data-lucide="camera" style="font-size:16px"></i>Alterar
                                foto</button>
                            <input type="file" id="avatar-input" accept="image/*" style="display:none">
                        </div>
                    </div>

                    <!-- Form Card -->
                    <div class="card">
                        <div class="card-header">
                            <h3 class="font-bold text-sm">Dados Pessoais</h3>
                        </div>
                        <div class="card-body" style="display:flex;flex-direction:column;gap:16px">
                            <div class="grid gap-4" style="grid-template-columns:1fr 1fr">
                                <div><label class="form-label">Nome Completo</label><input type="text"
                                        class="form-input" id="perfil-nome"></div>
                                <div><label class="form-label">E-mail</label><input type="email" class="form-input"
                                        id="perfil-email" disabled></div>
                                <div><label class="form-label">Telefone</label><input type="text" class="form-input"
                                        id="perfil-telefone"></div>
                                <div><label class="form-label">Cargo</label><input type="text" class="form-input"
                                        id="perfil-cargo"></div>
                                <div><label class="form-label">Departamento</label><input type="text" class="form-input"
                                        id="perfil-departamento"></div>
                                <div><label class="form-label">Empresa</label><input type="text" class="form-input"
                                        id="perfil-empresa"></div>
                            </div>
                            <div><label class="form-label">Bio</label><textarea class="form-textarea" id="perfil-bio"
                                    rows="3"></textarea></div>
                            <div style="display:flex;justify-content:flex-end;gap:12px">
                                <button class="btn btn-primary" id="btn-salvar-perfil"><i data-lucide="save" style="font-size:16px"></i>Salvar
                                    Alterações</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="js/supabase.js"></script>
    <script src="js/queries.js"></script>
    <script src="js/shared.js"></script>
    <script src="js/perfil.js"></script>
    <style>
        @media (max-width: 768px) {
            .grid {
                grid-template-columns: 1fr !important;
            }
        }
    </style>
  <script src="/js/pwa-install.js"></script>
  <script>document.addEventListener("DOMContentLoaded",()=>lucide.createIcons());</script>
</body>

</html>
