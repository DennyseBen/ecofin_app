<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- PWA -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#16a34a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="EcoFin">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
    <title>EcoFin Manager — Meu Perfil</title>
    <meta name="description" content="EcoFin Manager - Gerencie seu perfil e preferências.">
    <link rel="stylesheet" href="css/styles.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap"
        rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body>
    <div class="app-layout">
        <div class="sidebar-overlay" id="sidebar-overlay"></div>
        <aside class="app-sidebar" id="sidebar">
            <div class="sidebar-logo">
                <div class="sidebar-logo-icon">E</div>
                <div>
                    <h1>EcoFin</h1><small>Manager</small>
                </div>
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html"><span class="material-symbols-outlined">space_dashboard</span>Visão Geral</a>
                <a href="licencas.html"><span class="material-symbols-outlined">verified</span>Licenças</a>
                <a href="financeiro.html"><span
                        class="material-symbols-outlined">account_balance_wallet</span>Financeiro</a>
                <a href="clientes.html"><span class="material-symbols-outlined">group</span>Clientes</a>
                <a href="processos.html"><span class="material-symbols-outlined">view_kanban</span>Processos</a>
                <a href="perfil.html" class="active"><span class="material-symbols-outlined">person</span>Meu Perfil</a>
            </nav>
            <div class="sidebar-user">
                <div class="sidebar-user-card">
                    <div class="sidebar-avatar" id="sidebar-avatar">U</div>
                    <div class="sidebar-user-info">
                        <p id="sidebar-user-name">Usuário</p><small id="sidebar-user-email">—</small>
                    </div><button id="btn-logout" title="Sair"><span class="material-symbols-outlined"
                            style="font-size:18px;color:var(--text-muted)">logout</span></button>
                </div>
            </div>
        </aside>

        <main class="app-main">
            <header class="app-header">
                <div class="flex items-center gap-3">
                    <button class="hamburger-btn" id="hamburger-btn"><span
                            class="material-symbols-outlined">menu</span></button>
                    <div>
                        <h2 class="text-lg font-bold">Meu Perfil</h2>
                        <p class="text-xs text-muted hide-mobile">Dados pessoais e preferências</p>
                    </div>
                </div>
                <div class="flex items-center gap-2">
                    <button class="theme-toggle" id="theme-toggle" title="Alternar tema"><span
                            class="material-symbols-outlined" id="theme-icon">dark_mode</span></button>
                </div>
            </header>

            <div class="app-content">
                <div class="grid gap-6 fade-in" style="grid-template-columns:340px 1fr;max-width:960px">
                    <!-- Avatar Card -->
                    <div class="card" style="text-align:center">
                        <div class="card-body" style="padding:32px 24px">
                            <div style="width:100px;height:100px;border-radius:50%;background:var(--primary-bg);border:3px solid var(--primary-border);display:flex;align-items:center;justify-content:center;font-size:36px;font-weight:800;color:var(--primary);margin:0 auto 16px"
                                id="perfil-avatar-lg">A</div>
                            <h3 class="text-lg font-bold" id="perfil-nome-display">Carregando...</h3>
                            <p class="text-sm text-muted" id="perfil-cargo-display">—</p>
                            <p class="text-xs text-muted mt-2" id="perfil-email-display">—</p>
                            <button class="btn btn-outline btn-sm mt-4" id="btn-upload-avatar"><span
                                    class="material-symbols-outlined" style="font-size:16px">photo_camera</span>Alterar
                                foto</button>
                            <input type="file" id="avatar-input" accept="image/*" style="display:none">
                        </div>
                    </div>

                    <!-- Form Card -->
                    <div class="card">
                        <div class="card-header">
                            <h3 class="font-bold text-sm">Dados Pessoais</h3>
                        </div>
                        <div class="card-body" style="display:flex;flex-direction:column;gap:16px">
                            <div class="grid gap-4" style="grid-template-columns:1fr 1fr">
                                <div><label class="form-label">Nome Completo</label><input type="text"
                                        class="form-input" id="perfil-nome"></div>
                                <div><label class="form-label">E-mail</label><input type="email" class="form-input"
                                        id="perfil-email" disabled></div>
                                <div><label class="form-label">Telefone</label><input type="text" class="form-input"
                                        id="perfil-telefone"></div>
                                <div><label class="form-label">Cargo</label><input type="text" class="form-input"
                                        id="perfil-cargo"></div>
                                <div><label class="form-label">Departamento</label><input type="text" class="form-input"
                                        id="perfil-departamento"></div>
                                <div><label class="form-label">Empresa</label><input type="text" class="form-input"
                                        id="perfil-empresa"></div>
                            </div>
                            <div><label class="form-label">Bio</label><textarea class="form-textarea" id="perfil-bio"
                                    rows="3"></textarea></div>
                            <div style="display:flex;justify-content:flex-end;gap:12px">
                                <button class="btn btn-primary" id="btn-salvar-perfil"><span
                                        class="material-symbols-outlined" style="font-size:16px">save</span>Salvar
                                    Alterações</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="js/supabase.js"></script>
    <script src="js/queries.js"></script>
    <script src="js/shared.js"></script>
    <script src="js/perfil.js"></script>
    <style>
        @media (max-width: 768px) {
            .grid {
                grid-template-columns: 1fr !important;
            }
        }
    </style>
  <script src="/js/pwa-install.js"></script>
</body>

</html>
