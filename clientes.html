<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- PWA -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#16a34a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="EcoFin">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
    <title>EcoFin Manager — Gestão de Clientes</title>
    <meta name="description" content="EcoFin Manager - Gestão de clientes com visão 360°.">
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body>
    <div class="app-layout">
        <div class="sidebar-overlay" id="sidebar-overlay"></div>
        <aside class="app-sidebar" id="sidebar">
            <div class="sidebar-logo">
                <div class="sidebar-logo-icon">E</div>
                <div>
                    <h1>EcoFin</h1><small>Manager</small>
                </div>
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html"><i data-lucide="layout-dashboard"></i>Visão Geral</a>
                <a href="licencas.html"><i data-lucide="badge-check"></i>Licenças</a>
                <a href="financeiro.html"><i data-lucide="wallet"></i>Financeiro</a>
                <a href="clientes.html" class="active"><i data-lucide="users"></i>Clientes</a>
                <a href="processos.html"><i data-lucide="kanban"></i>Processos</a>
                <a href="perfil.html"><i data-lucide="user"></i>Meu Perfil</a>
            </nav>
            <div class="sidebar-user">
                <div class="sidebar-user-card">
                    <div class="sidebar-avatar" id="sidebar-avatar">U</div>
                    <div class="sidebar-user-info">
                        <p id="sidebar-user-name">Usuário</p><small id="sidebar-user-email">—</small>
                    </div><button id="btn-logout" title="Sair"><i data-lucide="log-out" style="font-size:18px;color:var(--text-muted)"></i></button>
                </div>
            
            <div class="sidebar-version"><span>v1.0.0</span><span>Mar 2026</span></div>
        </aside>

        <main class="app-main">
            <header class="app-header">
                <div class="flex items-center gap-3">
                    <button class="hamburger-btn" id="hamburger-btn"><i data-lucide="menu"></i></button>
                    <div>
                        <h2 class="text-lg font-bold">Gestão de Clientes</h2>
                        <p class="text-xs text-muted hide-mobile">Visão 360° de todos os clientes</p>
                    </div>
                </div>
                <div class="flex items-center gap-2">
                    <button class="theme-toggle" id="theme-toggle" title="Alternar tema"><i data-lucide="moon" id="theme-icon"></i></button>
                    <div class="hide-mobile" style="position:relative"><i data-lucide="search" style="position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:16px;color:var(--text-muted)"></i><input
                            type="text" id="search-clientes" class="form-input" placeholder="Buscar cliente..."
                            style="padding-left:34px;width:200px"></div>
                    <button class="btn btn-primary btn-sm" id="btn-novo-cliente"><i data-lucide="user-plus" style="font-size:16px"></i><span class="hide-mobile">Novo
                            Cliente</span></button>
                </div>
            </header>

            <div class="app-content">
                <!-- KPIs -->
                <div class="kpi-grid mb-6 fade-in">
                    <div class="kpi-card">
                        <div class="flex items-center gap-3">
                            <div class="kpi-icon green"><i data-lucide="users"></i></div>
                            <div>
                                <div class="kpi-label">Total</div>
                                <div class="kpi-value" id="kpi-total">—</div>
                            </div>
                        </div>
                    </div>
                    <div class="kpi-card">
                        <div class="flex items-center gap-3">
                            <div class="kpi-icon green"><i data-lucide="check-circle-2"></i>
                            </div>
                            <div>
                                <div class="kpi-label">Ativos</div>
                                <div class="kpi-value" id="kpi-ativos">—</div>
                            </div>
                        </div>
                    </div>
                    <div class="kpi-card">
                        <div class="flex items-center gap-3">
                            <div class="kpi-icon red"><i data-lucide="x-circle"></i></div>
                            <div>
                                <div class="kpi-label">Inativos</div>
                                <div class="kpi-value" id="kpi-inativos">—</div>
                            </div>
                        </div>
                    </div>
                    <div class="kpi-card">
                        <div class="flex items-center gap-3">
                            <div class="kpi-icon blue"><i data-lucide="badge-check"></i></div>
                            <div>
                                <div class="kpi-label">Com Licenças</div>
                                <div class="kpi-value" id="kpi-com-licencas">—</div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Client Grid -->
                <div class="grid gap-4 fade-in" id="clientes-grid"
                    style="grid-template-columns:repeat(auto-fill,minmax(320px,1fr))"></div>
            </div>
        </main>
    </div>

    <script src="js/supabase.js"></script>
    <script src="js/queries.js"></script>
    <script src="js/shared.js"></script>
    <script src="js/clientes.js"></script>
  <script src="/js/pwa-install.js"></script>
  <script>document.addEventListener("DOMContentLoaded",()=>lucide.createIcons());</script>
</body>

</html>
