<!doctype html>
<html lang="pt-BR" class="dark theme-moderno">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/logo.jpeg" />
    <link rel="apple-touch-icon" href="/logo.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#059669" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="description" content="EcoFin Manager - Sistema de Gestão de Licenciamento Ambiental" />
    <title>EcoFin Manager</title>
    <!-- Aplica tema salvo ANTES da primeira pintura para evitar flash -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem('ecofin-theme');
          var valid = ['contemporaneo', 'moderno', 'galaxy'];
          if (!valid.includes(t)) t = 'moderno';
          document.documentElement.classList.remove('theme-contemporaneo', 'theme-moderno', 'theme-galaxy');
          document.documentElement.classList.add('theme-' + t);
          if (t === 'moderno' || t === 'galaxy') {
            document.documentElement.classList.add('dark');
          } else {
            document.documentElement.classList.remove('dark');
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Limpa SW e cache agressivamente a cada deploy
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(regs => {
          regs.forEach(r => r.unregister());
        });
        caches.keys().then(keys => Promise.all(keys.map(k => caches.delete(k))));
        // Se SW ainda estiver controlando, força reload após limpeza
        if (navigator.serviceWorker.controller) {
          navigator.serviceWorker.ready.then(reg => {
            reg.unregister().then(() => { window.location.reload(); });
          });
        }
      }
    </script>
  </body>
</html>
