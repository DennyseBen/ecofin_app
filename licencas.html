<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- PWA -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#16a34a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="EcoFin">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
    <title>EcoFin Manager — Licenças</title>
    <meta name="description" content="EcoFin Manager - Gerencie licenças ambientais.">
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body>
    <div class="app-layout">
        <div class="sidebar-overlay" id="sidebar-overlay"></div>
        <aside class="app-sidebar" id="sidebar">
            <div class="sidebar-logo">
                <div class="sidebar-logo-icon">E</div>
                <div>
                    <h1>EcoFin</h1><small>Manager</small>
                </div>
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html"><i data-lucide="layout-dashboard"></i>Visão Geral</a>
                <a href="licencas.html" class="active"><i data-lucide="badge-check"></i>Licenças</a>
                <a href="financeiro.html"><i data-lucide="wallet"></i>Financeiro</a>
                <a href="clientes.html"><i data-lucide="users"></i>Clientes</a>
                <a href="processos.html"><i data-lucide="kanban"></i>Processos</a>
                <a href="perfil.html"><i data-lucide="user"></i>Meu Perfil</a>
            </nav>
            <div class="sidebar-user">
                <div class="sidebar-user-card">
                    <div class="sidebar-avatar" id="sidebar-avatar">U</div>
                    <div class="sidebar-user-info">
                        <p id="sidebar-user-name">Usuário</p><small id="sidebar-user-email">—</small>
                    </div><button id="btn-logout" title="Sair"><i data-lucide="log-out" style="font-size:18px;color:var(--text-muted)"></i></button>
                </div>
            
            <div class="sidebar-version"><span>v1.0.0</span><span>Mar 2026</span></div>
        </aside>

        <main class="app-main">
            <header class="app-header">
                <div class="flex items-center gap-3">
                    <button class="hamburger-btn" id="hamburger-btn"><i data-lucide="menu"></i></button>
                    <div>
                        <h2 class="text-lg font-bold">Licenças Ambientais</h2>
                        <p class="text-xs text-muted hide-mobile">Gestão de licenças e condicionantes</p>
                    </div>
                </div>
                <div class="flex items-center gap-2">
                    <button class="theme-toggle" id="theme-toggle" title="Alternar tema"><i data-lucide="moon" id="theme-icon"></i></button>
                    <button class="btn btn-primary btn-sm" id="btn-nova-licenca"><i data-lucide="plus" style="font-size:16px"></i><span class="hide-mobile">Nova Licença</span></button>
                </div>
            </header>

            <div class="app-content">
                <div class="kpi-grid mb-6 fade-in">
                    <div class="kpi-card">
                        <div class="flex items-center gap-3">
                            <div class="kpi-icon green"><i data-lucide="check-circle-2"></i>
                            </div>
                            <div>
                                <div class="kpi-label">Vigentes</div>
                                <div class="kpi-value" id="kpi-vigentes">—</div>
                            </div>
                        </div>
                    </div>
                    <div class="kpi-card">
                        <div class="flex items-center gap-3">
                            <div class="kpi-icon red"><i data-lucide="x-circle"></i></div>
                            <div>
                                <div class="kpi-label">Vencidas</div>
                                <div class="kpi-value" id="kpi-vencidas">—</div>
                            </div>
                        </div>
                    </div>
                    <div class="kpi-card">
                        <div class="flex items-center gap-3">
                            <div class="kpi-icon yellow"><i data-lucide="refresh-cw"></i></div>
                            <div>
                                <div class="kpi-label">Renovando</div>
                                <div class="kpi-value" id="kpi-renovando">—</div>
                            </div>
                        </div>
                    </div>
                    <div class="kpi-card">
                        <div class="flex items-center gap-3">
                            <div class="kpi-icon blue"><i data-lucide="triangle-alert"></i></div>
                            <div>
                                <div class="kpi-label">Em Exigência</div>
                                <div class="kpi-value" id="kpi-exigencia">—</div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="card fade-in">
                    <div class="card-header flex items-center justify-between">
                        <div>
                            <h3 class="font-bold text-sm">Todas as Licenças</h3>
                        </div>
                        <div style="position:relative"><i data-lucide="search" style="position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:16px;color:var(--text-muted)"></i><input
                                type="text" id="search-licencas" class="form-input" placeholder="Buscar..."
                                style="padding-left:34px;width:200px"></div>
                    </div>
                    <div style="overflow-x:auto">
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th>Licença</th>
                                    <th>Processo</th>
                                    <th>Órgão</th>
                                    <th>Vencimento</th>
                                    <th>Status</th>
                                    <th>Ações</th>
                                </tr>
                            </thead>
                            <tbody id="licencas-tbody"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="js/supabase.js"></script>
    <script src="js/queries.js"></script>
    <script src="js/shared.js"></script>
    <script src="js/licencas.js"></script>
  <script src="/js/pwa-install.js"></script>
  <script>document.addEventListener("DOMContentLoaded",()=>lucide.createIcons());</script>
</body>

</html>
